<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lost Items</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-gray-200 min-h-screen p-6 font-sans">

<h2 class="text-3xl font-bold mb-8 text-center text-purple-900 tracking-wide">
🔍 Lost Items
</h2>

<div id="container" class="grid gap-6"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { initializeFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAv6e14kxuK5PtbLNvP9HEvWjrWG",
  authDomain: "lost-found-system-732ba.firebaseapp.com",
  projectId: "lost-found-system-732ba"
};

const app = initializeApp(firebaseConfig);
const db = initializeFirestore(app, { experimentalForceLongPolling: true });

const container = document.getElementById("container");

async function loadLostItems() {

  const snap = await getDocs(collection(db, "lostItems"));

  container.innerHTML = "";

  if (snap.empty) {
    container.innerHTML = `<p class="text-center text-gray-500 text-lg">No lost items</p>`;
    return;
  }

  snap.forEach(doc => {
    const data = doc.data();

    const card = document.createElement("div");
    card.className = "bg-white p-6 rounded-2xl shadow-lg border border-gray-200 hover:shadow-xl transition";

    card.innerHTML = `
      <h3 class="font-bold text-xl text-purple-900 mb-3">
        ${data.itemName}
      </h3>

      <div class="text-gray-700 text-sm space-y-1">
        <p><b>👤 Name:</b> ${data.name || "N/A"}</p>
        <p><b>📞 Phone:</b> ${data.phno || "N/A"}</p>
        <p><b>📍 Location:</b> ${data.location || "N/A"}</p>
        <p><b>📅 Date:</b> ${data.date || "N/A"}</p>
      </div>

      ${
        data.description 
        ? `<p class="mt-3 text-gray-600 text-sm italic border-l-4 border-purple-400 pl-3">
            ${data.description}
           </p>`
        : ""
      }
    `;

    container.appendChild(card);
  });
}

loadLostItems();
</script>

</body>
</html>
