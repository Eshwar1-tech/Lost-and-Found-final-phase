<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-950 via-slate-900 to-gray-900 min-h-screen text-white">

<!-- 🔥 NAVBAR -->
<nav class="bg-white/10 backdrop-blur-lg border-b border-white/20 p-4 flex justify-between items-center shadow-lg">
<h1 class="text-xl font-bold tracking-wide">🚀 Lost & Found Dashboard</h1>
<button id="logoutBtn" class="bg-red-500 hover:bg-red-600 px-4 py-1.5 rounded-lg shadow transition">
Logout
</button>
</nav>

<!-- 🔥 GRID -->
<div class="p-6 grid gap-6 md:grid-cols-2 lg:grid-cols-4">

<!-- CARD -->
<div class="bg-white/10 backdrop-blur-lg p-6 rounded-2xl text-center shadow-lg hover:scale-105 hover:shadow-2xl transition duration-300 border border-white/20">
<h3 class="text-lg font-semibold mb-2">📦 Post Lost Item</h3>
<p class="text-sm text-gray-300 mb-3">Report items you lost</p>
<button onclick="location.href='lost.html'" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 mt-2 rounded-lg shadow transition">
Go
</button>
</div>

<!-- CARD -->
<div class="bg-white/10 backdrop-blur-lg p-6 rounded-2xl text-center shadow-lg hover:scale-105 hover:shadow-2xl transition duration-300 border border-white/20">
<h3 class="text-lg font-semibold mb-2">🔍 Post Found Item</h3>
<p class="text-sm text-gray-300 mb-3">Submit found items</p>
<button onclick="location.href='post-found.html'" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 mt-2 rounded-lg shadow transition">
Go
</button>
</div>

<!-- CARD -->
<div class="bg-white/10 backdrop-blur-lg p-6 rounded-2xl text-center shadow-lg hover:scale-105 hover:shadow-2xl transition duration-300 border border-white/20">
<h3 class="text-lg font-semibold mb-2">📋 View Items</h3>
<p class="text-sm text-gray-300 mb-3">Browse all items</p>
<button onclick="location.href='view-items.html'" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 mt-2 rounded-lg shadow transition">
Go
</button>
</div>

<!-- CARD -->
<div class="bg-white/10 backdrop-blur-lg p-6 rounded-2xl text-center shadow-lg hover:scale-105 hover:shadow-2xl transition duration-300 border border-white/20">
<h3 class="text-lg font-semibold mb-2">📂 My Activity</h3>
<p class="text-sm text-gray-300 mb-3">Check your reports</p>
<button onclick="location.href='my-items.html'" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 mt-2 rounded-lg shadow transition">
Check
</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyAv6e14kxuK5PtbLNvP9HEvWDMHOVWjrWg",
authDomain: "lost-found-system-732ba.firebaseapp.com",
projectId: "lost-found-system-732ba"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, user => {
if(!user) location.href="index.html";
});

document.getElementById("logoutBtn").onclick = async ()=>{
await signOut(auth);
location.href="index.html";
};
</script>

</body>
</html>
