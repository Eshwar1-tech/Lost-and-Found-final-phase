<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>View Items</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-gray-200 min-h-screen p-6 font-sans">

<h2 class="text-3xl font-bold mb-8 text-blue-900 text-center tracking-wide">
📋 Found Items
</h2>

<div id="container" class="grid gap-6"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, getDocs, initializeFirestore } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

// 🔥 Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyAv6e14kxuK5PtbLNvP9HEvWDMHOVWjrWg",
  authDomain: "lost-found-system-732ba.firebaseapp.com",
  projectId: "lost-found-system-732ba"
};

// ✅ Init
const app = initializeApp(firebaseConfig);

const db = initializeFirestore(app, {
  experimentalForceLongPolling: true
});

const container = document.getElementById("container");

// 🔥 LOAD DATA FUNCTION
async function loadItems() {
  try {
    console.log("Fetching data...");

    const snapshot = await getDocs(collection(db, "foundItems"));

    console.log("Docs count:", snapshot.size);

    container.innerHTML = "";

    if (snapshot.empty) {
      container.innerHTML = `
        <p class="text-center text-gray-500 text-lg">No items found</p>
      `;
      return;
    }

    snapshot.forEach((doc) => {
      const data = doc.data();

      const card = document.createElement("div");
      card.className = "bg-white p-6 rounded-2xl shadow-lg border border-gray-200 hover:shadow-xl transition";

      card.innerHTML = `
        <h3 class="text-xl font-bold text-blue-900 mb-3">
          ${data.itemName || "No Name"}
        </h3>

        <div class="text-gray-700 text-sm space-y-1">
          <p><b>📍 Location:</b> ${data.location ? data.location.trim() : "N/A"}</p>
          <p><b>📅 Date:</b> ${data.date || "N/A"}</p>
        </div>
<p><b>🔖 Model:</b> ${
  data.model 
  ? data.model.split(" ")[0] + " ****" 
  : "N/A"
}</p>

        <div class="mt-4">
          <button class="w-full bg-green-600 text-white py-2.5 rounded-lg shadow hover:bg-green-700 transition font-semibold claimBtn">
            🔐 Claim Item
          </button>
        </div>

        <p class="text-xs text-gray-400 mt-2 text-center">
          Provide correct details to claim your item
        </p>
      `;

      const claimBtn = card.querySelector(".claimBtn");

      claimBtn.onclick = () => {
        localStorage.setItem("claimItemId", doc.id);
        window.location.href = "claim.html";
      };

      container.appendChild(card);
    });

  } catch (error) {
    console.error("🔥 ERROR:", error);

    container.innerHTML = `
      <p class="text-center text-red-500 text-lg">Error loading data</p>
    `;

    alert("Error: " + error.message);
  }
}

loadItems();
</script>

</body>
</html>
