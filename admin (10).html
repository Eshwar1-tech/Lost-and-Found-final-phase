<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-slate-100 to-gray-200 min-h-screen p-6 font-sans">

<h2 class="text-2xl font-bold mb-6 text-center text-gray-800 tracking-wide">
🛠 Admin Panel
</h2>

<div id="data" class="grid gap-6"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAv6e14kxuK5PtbLNvP9HEvWDMHOVWjrWg",
  authDomain: "lost-found-system-732ba.firebaseapp.com",
  projectId: "lost-found-system-732ba"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const ADMIN_EMAIL = "admin@gmail.com";

const div = document.getElementById("data");

// 🔐 AUTH CHECK (IMPROVED)
onAuthStateChanged(auth, (user) => {

  if (!user) {
    window.location.replace("index.html");
    return;
  }

  const email = user.email.trim().toLowerCase();

  if (email !== ADMIN_EMAIL.toLowerCase()) {
    alert("Access denied! Admin only.");
    window.location.replace("dashboard.html");
    return;
  }

  loadData();
});

// 🔥 LOAD DATA
function loadData() {

  onSnapshot(collection(db, "foundItems"), snap => {

    div.innerHTML = "";

    if (snap.empty) {
      div.innerHTML = `<p class="text-center text-gray-500 text-lg">No items found</p>`;
      return;
    }

    snap.forEach(d => {
      const data = d.data();

      const card = document.createElement("div");
      card.className = "bg-white p-6 rounded-2xl shadow-lg border border-gray-200 hover:shadow-xl transition";

      card.innerHTML = `
        <h3 class="font-bold text-xl text-blue-900 mb-3">${data.itemName || "No Name"}</h3>

        <div class="space-y-1 text-gray-700 text-sm">
          <p><b>📍 Location:</b> ${data.location || "N/A"}</p>
          <p><b>👤 Name:</b> ${data.name || "N/A"}</p>
          <p><b>📞 Phone:</b> ${data.phno || "N/A"}</p>
        </div>

        ${
          data.image
          ? `
          <div class="mt-4">
            <p class="font-semibold text-gray-800 mb-1">📸 Item Image:</p>
            <img src="${data.image}" 
              class="w-full h-48 object-cover rounded-xl border shadow-sm">
          </div>
          `
          : `<p class="text-gray-400 mt-3">No image available</p>`
        }
      `;

      div.appendChild(card);
    });

  });

}
</script>

</body>
</html>
